name: Android → Firebase App Distribution

# ── 트리거 ──────────────────────────────────────────────────────────
# 1) main 브랜치 push 시 자동 배포 (내부 테스터용)
# 2) v* 태그 push 시 자동 배포 (예: v1.0.9)
# 3) GitHub Actions UI에서 수동 실행도 가능
on:
  push:
    branches: [main]
    tags:     ['v*']
  workflow_dispatch:
    inputs:
      release_notes:
        description: '릴리즈 노트 (비워두면 커밋 메시지 사용)'
        required: false
        default: ''

jobs:
  distribute:
    name: Build & Distribute
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. 소스 체크아웃 ──────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node.js 설정 ──────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Java 21 설정 (Gradle 빌드용) ─────────────────────────
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # ── 4. npm 의존성 설치 ────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 5. Next.js 빌드 ──────────────────────────────────────────
      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL:                ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY:           ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_FIREBASE_API_KEY:            ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:        ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID:         ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET:     ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID:             ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_FIREBASE_VAPID_KEY:          ${{ secrets.NEXT_PUBLIC_FIREBASE_VAPID_KEY }}

      # ── 6. Capacitor Sync ─────────────────────────────────────────
      - name: Capacitor sync
        run: npx cap sync android

      # ── 7. Gradle 캐시 ────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # ── 8. 키스토어 복원 ──────────────────────────────────────────
      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > ~/gleaum-release.keystore
        shell: bash

      # ── 9. 릴리즈 노트 작성 ───────────────────────────────────────
      - name: Write release notes
        run: |
          if [ -n "${{ github.event.inputs.release_notes }}" ]; then
            echo "${{ github.event.inputs.release_notes }}" > android/release-notes.txt
          else
            echo "$(git log -1 --pretty=format:'%s')" > android/release-notes.txt
          fi
          echo "📝 릴리즈 노트: $(cat android/release-notes.txt)"

      # ── 10. APK 빌드 ──────────────────────────────────────────────
      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon
        env:
          ANDROID_KEYSTORE_PATH: /root/gleaum-release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      # ── 11. Firebase CLI 설치 + App Distribution 업로드 ───────────
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Upload to App Distribution
        run: |
          firebase appdistribution:distribute \
            android/app/build/outputs/apk/release/app-release.apk \
            --app "1:913127709928:android:c4334b982b98b282febd5d" \
            --groups "internal-testers" \
            --release-notes-file "android/release-notes.txt" \
            --token "${{ secrets.FIREBASE_CI_TOKEN }}"

      # ── 12. APK 아티팩트 저장 (7일 보관) ─────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gleaum-${{ github.sha }}.apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7
