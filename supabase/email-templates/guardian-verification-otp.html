<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>글리움 보호자 확인 코드</title>
  </head>
  <body style="margin:0;padding:0;background:#f4f7fa;color:#1a1b2e;font-family:Pretendard,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background:#f4f7fa;">
      <tr>
        <td align="center" style="padding:40px 16px;">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="max-width:560px;background:#ffffff;border:1px solid #e6edf3;border-radius:24px;overflow:hidden;">
            <tr>
              <td style="height:8px;background:linear-gradient(90deg,#2ee895 0%,#0cc9b5 48%,#0084cc 100%);font-size:0;line-height:0;">&nbsp;</td>
            </tr>
            <tr>
              <td style="padding:36px 36px 18px;">
                <p style="margin:0 0 28px;color:#0084cc;font-size:17px;font-weight:800;letter-spacing:-0.02em;">gleaum</p>
                <p style="margin:0 0 10px;color:#0a8f69;font-size:12px;font-weight:800;letter-spacing:0.12em;">GUARDIAN VERIFICATION</p>
                <h1 style="margin:0;color:#1a1b2e;font-size:28px;line-height:1.35;font-weight:800;letter-spacing:-0.04em;">보호자 이메일을<br>확인해 주세요</h1>
              </td>
            </tr>
            <tr>
              <td style="padding:0 36px 24px;">
                <p style="margin:0;color:#626b78;font-size:15px;line-height:1.75;">
                  자녀 계정 연결을 계속하려면 글리움 화면에 아래 6자리 확인 코드를 입력해 주세요.
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding:0 36px 28px;">
                <div style="padding:24px 16px;border:1px solid #dce7ef;border-radius:18px;background:#f7fafc;text-align:center;">
                  <p style="margin:0 0 8px;color:#7a8491;font-size:12px;font-weight:700;letter-spacing:0.08em;">확인 코드</p>
                  <p style="margin:0;color:#0084cc;font-size:34px;line-height:1.2;font-weight:800;letter-spacing:0.2em;font-variant-numeric:tabular-nums;">{{ .Token }}</p>
                </div>
              </td>
            </tr>
            <tr>
              <td style="padding:0 36px 36px;">
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background:#eef8f7;border-radius:16px;">
                  <tr>
                    <td style="padding:16px 18px;color:#526269;font-size:12px;line-height:1.65;">
                      이 코드는 요청한 보호자만 사용해야 합니다. 본인이 요청하지 않았다면 코드를 입력하거나 다른 사람에게 전달하지 마세요.
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td style="padding:22px 36px;border-top:1px solid #edf1f4;color:#9299a3;font-size:11px;line-height:1.6;">
                본 메일은 글리움 보호자 확인 요청에 따라 자동 발송되었습니다.<br>
                문의: helper@gleaum.com
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
